format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: false
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    anchor-sections: true
    citations-hover: true
    footnotes-hover: true
    mainfont: "Source Sans Pro, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    monofont: "JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace"
    fontsize: "1.05rem"
    linkcolor: "#1f5582"
    grid:
      sidebar-width: 200px
      body-width: 760px
      margin-width: 200px
